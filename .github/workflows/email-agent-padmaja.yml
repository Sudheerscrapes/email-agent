name: Padmaja SAC Datasphere Email Agent

on:
  schedule:
    # Runs every 30 minutes between 6:30 PM - 4:30 AM IST
    # IST = UTC+5:30, so 6:30 PM IST = 13:00 UTC, 4:30 AM IST = 23:00 UTC
    - cron: '0,30 13-23 * * *'
    - cron: '0,30 0-23 * * *'
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pytz

      - name: Run Padmaja SAC Datasphere Email Agent
        env:
          YOUR_EMAIL: ${{ secrets.YOUR_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          CC_PADMAJA_SAC: padmaja8419@gmail.com
          RESUME_PADMAJA_SAC_B64: ${{ secrets.RESUME_PADMAJA_SAC_B64 }}
        run: |
          python agent_padmaja.py
