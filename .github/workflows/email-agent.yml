name: Email Agent

on:
  schedule:
    - cron: '*/30 * * * *'  # runs every 30 minutes
  workflow_dispatch:         # allows manual run

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: python email_agent.py
        env:
          YOUR_EMAIL: ${{ secrets.YOUR_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RESUME_DEVOPS_B64: ${{ secrets.RESUME_DEVOPS_B64 }}
          RESUME_CLOUD_B64: ${{ secrets.RESUME_CLOUD_B64 }}
          RESUME_SRE_B64: ${{ secrets.RESUME_SRE_B64 }}
          RESUME_DEFAULT_B64: ${{ secrets.RESUME_DEFAULT_B64 }}
          CC_DEVOPS: ${{ secrets.CC_DEVOPS }}
          CC_CLOUD: ${{ secrets.CC_CLOUD }}
          CC_SRE: ${{ secrets.CC_SRE }}
