name: Run Email Agent - Naveen (SAP SD)

on:
  schedule:
    - cron: '0 13 * * *'   # 6:30 PM IST
    - cron: '0 16 * * *'   # 9:30 PM IST
    - cron: '0 20 * * *'   # 1:30 AM IST
  workflow_dispatch:

jobs:
  run-naveen-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pytz

      - name: Run Naveen Email Agent
        env:
          IMAP_EMAIL: ${{ secrets.IMAP_EMAIL }}
          IMAP_APP_PASSWORD: ${{ secrets.IMAP_APP_PASSWORD }}
          NAVEEN_SMTP_EMAIL: ${{ secrets.NAVEEN_SMTP_EMAIL }}
          NAVEEN_SMTP_APP_PASSWORD: ${{ secrets.NAVEEN_SMTP_APP_PASSWORD }}
        run: python agent_naveen.py
