name: Agent Rajesh BI - Reporting Specialist (Remote Only)

on:
  schedule:
    - cron: '*/15 * * * *'   # Every 15 minutes
  workflow_dispatch:           # Manual trigger from Actions tab

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pytz

      - name: Run Rajesh BI Email Agent
        env:
          IMAP_EMAIL: ${{ secrets.IMAP_EMAIL }}
          IMAP_APP_PASSWORD: ${{ secrets.IMAP_APP_PASSWORD }}
          RAJESH_BI_SMTP_EMAIL: ${{ secrets.RAJESH_BI_SMTP_EMAIL }}
          RAJESH_BI_SMTP_APP_PASSWORD: ${{ secrets.RAJESH_BI_SMTP_APP_PASSWORD }}
          CC_RAJESH_BI: ${{ secrets.CC_RAJESH_BI }}
        run: python agent_rajesh_bi.py

      - name: Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rajesh-bi-logs-${{ github.run_number }}
          path: logs/
          retention-days: 7
