name: Agent Lovkya - SAP EWM Consultant

on:
  schedule:
    - cron: '*/15 * * * *'   # Every 15 minutes
  workflow_dispatch:           # Manual trigger from Actions tab

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pytz

      - name: Run Lovkya Email Agent
        env:
          IMAP_EMAIL: ${{ secrets.IMAP_EMAIL }}
          IMAP_APP_PASSWORD: ${{ secrets.IMAP_APP_PASSWORD }}
          LOVKYA_SMTP_EMAIL: ${{ secrets.LOVKYA_SMTP_EMAIL }}
          LOVKYA_SMTP_APP_PASSWORD: ${{ secrets.LOVKYA_SMTP_APP_PASSWORD }}
          CC_LOVKYA: ${{ secrets.CC_LOVKYA }}
        run: python agent_lovkya.py

      - name: Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lovkya-logs-${{ github.run_number }}
          path: logs/
          retention-days: 7
