name: Agent NagaRavi - SAP S4HANA Sales / OTC / SD

on:
  schedule:
    # Runs every 30 min during IST window: 6:30 PM - 4:30 AM IST (13:00 - 23:00 UTC)
    - cron: '15,45 13-23 * * *'
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pytz

      - name: Write resume file
        run: |
          echo "${{ secrets.RESUME_NAGARAVI_B64 }}" > resume_nagaravi_b64.txt

      - name: Run Agent NagaRavi
        env:
          IMAP_EMAIL: ${{ secrets.IMAP_EMAIL }}
          IMAP_APP_PASSWORD: ${{ secrets.IMAP_APP_PASSWORD }}
          NAGARAVI_SMTP_EMAIL: ${{ secrets.NAGARAVI_SMTP_EMAIL }}
          NAGARAVI_SMTP_APP_PASSWORD: ${{ secrets.NAGARAVI_SMTP_APP_PASSWORD }}
          CC_NAGARAVI: ${{ secrets.CC_NAGARAVI }}
        run: |
          python agent_nagaravi.py

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nagaravi-logs-${{ github.run_number }}
          path: logs/
          retention-days: 7
