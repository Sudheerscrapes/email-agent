name: Agent Vamsee - SAP SD / OTC / S4HANA / Vistex / RAR

on:
  schedule:
    # Runs every 30 min during IST window: 6:30 PM - 4:30 AM IST (13:00 - 23:00 UTC)
    - cron: '5,35 13-23 * * *'
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pytz

      - name: Write resume file
        run: |
          echo "${{ secrets.RESUME_VAMSEE_B64 }}" > resume_vamsee_b64.txt

      - name: Run Agent Vamsee
        env:
          IMAP_EMAIL: ${{ secrets.IMAP_EMAIL }}
          IMAP_APP_PASSWORD: ${{ secrets.IMAP_APP_PASSWORD }}
          VAMSEE_SMTP_EMAIL: ${{ secrets.VAMSEE_SMTP_EMAIL }}
          VAMSEE_SMTP_APP_PASSWORD: ${{ secrets.VAMSEE_SMTP_APP_PASSWORD }}
          CC_VAMSEE: ${{ secrets.CC_VAMSEE }}
        run: |
          python agent_vamsee.py

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vamsee-logs-${{ github.run_number }}
          path: logs/
          retention-days: 7
