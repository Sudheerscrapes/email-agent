name: AI Email Agent - Swarna (Data Engineer)
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run Email Agent - Swarna
        env:
          YOUR_EMAIL: ${{ secrets.YOUR_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          CC_DATA_ENGINEER: ${{ secrets.CC_DATA_ENGINEER }}
        run: python agent1.py
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-swarna-${{ github.run_number }}
          path: logs/
          retention-days: 30