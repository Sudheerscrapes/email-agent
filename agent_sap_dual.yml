name: SAP Dual Agent - Naga & Vamsee (Remote Roles Only)

on:
  schedule:
    # Runs every 30 minutes during 6:30 PM - 4:30 AM IST
    # IST = UTC+5:30  →  6:30 PM IST = 13:00 UTC  |  4:30 AM IST = 23:00 UTC
    - cron: '0,30 13-23 * * *'   # 13:00 to 23:30 UTC (6:30 PM to 5:00 AM IST)
    - cron: '0,30 0 * * *'       # 00:00 and 00:30 UTC (5:30 AM and 6:00 AM IST safety)

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout repo ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ──────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. Cache pip packages ─────────────────────────────────────────────
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # ── 4. Install dependencies ───────────────────────────────────────────
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pytz

      # ── 5. Place resume base64 files from GitHub Secrets ─────────────────
      - name: Restore resume files from secrets
        env:
          RESUME_NAGA_B64: ${{ secrets.RESUME_NAGA_B64 }}
          RESUME_VAMSEE_B64: ${{ secrets.RESUME_VAMSEE_B64 }}
        run: |
          echo "$RESUME_NAGA_B64" > resume_naga_b64.txt
          echo "$RESUME_VAMSEE_B64" > resume_vamsee_b64.txt
          echo "Resume files written."
          wc -l resume_naga_b64.txt resume_vamsee_b64.txt

      # ── 6. Restore dedup log from cache (daily reset handled in agent) ────
      - name: Restore dedup cache
        uses: actions/cache@v4
        with:
          path: logs/
          key: sap-dual-dedup-${{ github.run_id }}
          restore-keys: |
            sap-dual-dedup-

      - name: Ensure logs directory exists
        run: mkdir -p logs

      # ── 7. Run the agent ──────────────────────────────────────────────────
      - name: Run SAP Dual Agent
        env:
          IMAP_EMAIL:             ${{ secrets.IMAP_EMAIL }}
          IMAP_APP_PASSWORD:      ${{ secrets.IMAP_APP_PASSWORD }}
          SAP_SMTP_EMAIL:         ${{ secrets.SAP_SMTP_EMAIL }}
          SAP_SMTP_APP_PASSWORD:  ${{ secrets.SAP_SMTP_APP_PASSWORD }}
          CC_NAGA:                ${{ secrets.CC_NAGA }}
          CC_VAMSEE:              ${{ secrets.CC_VAMSEE }}
        run: |
          python agent_sap_dual.py

      # ── 8. Upload logs as artifact (keeps last 7 runs) ────────────────────
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-logs-${{ github.run_number }}
          path: logs/
          retention-days: 7

      # ── 9. Save dedup cache after run ─────────────────────────────────────
      - name: Save dedup cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: logs/
          key: sap-dual-dedup-${{ github.run_id }}
